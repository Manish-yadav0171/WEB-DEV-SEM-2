<!DOCTYPE html>
<html>
<head>
    <title>Sum of N Numbers</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
  
        body {
            background-color: lightblue;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .container {
            background-color: white;
            width: 350px;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
        }

        h1 {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        #result {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Sum of N Numbers</h1>

        <input type="number" id="num" placeholder="Enter N">

        <button onclick="findSum()">Calculate</button>

        <p id="result"></p>
    </div>

    <script>
        function findSum() {
            let n = parseInt(document.getElementById("num").value);
            let sum = 0;

            for (let i = 1; i <= n; i++) {
                sum += i;
            }

            document.getElementById("result").innerHTML = "Sum = " + sum;
        }
    </script>

</body>
</html>
